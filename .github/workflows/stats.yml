name: Update Stats

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-cards:
    if: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate readme stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >-
            {
              "username": "${{ github.repository_owner }}",
              "theme": "transparent",
              "show_icons": true,
              "show": "prs_merged"
            }
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >-
            {
              "username": "${{ github.repository_owner }}",
              "layout": "donut",
              "theme": "transparent",
              "langs_count": 5
            }
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: stat-cards
          path: profile/*.svg

  generate-pins:
    if: false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [ "repo1", "repo2" ]
    steps:
      - uses: actions/checkout@v6

      - name: Generate pin card for ${{ matrix.repo }}
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: >-
            {
              "username": "${{ github.repository_owner }}",
              "repo": "${{ matrix.repo }}",
              "theme": "transparent"
            }
          path: profile/pins/${{ matrix.repo }}.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: pin-${{ matrix.repo }}
          path: profile/pins/*.svg

  commit-cards:
    needs: [generate-cards, generate-pins]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: stat-cards
          path: profile

      - uses: actions/download-artifact@v8
        if: ${{ needs.generate-pins.result == 'success' }}
        with:
          pattern: pin-*
          path: profile/pins
          merge-multiple: true

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          git commit -m "Update README cards" --signoff || exit 0
          git push
